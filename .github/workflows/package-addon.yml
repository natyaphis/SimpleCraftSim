name: Package Addon

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare package folder (exclude dev files)
        run: |
          set -euo pipefail
          rm -rf package
          mkdir -p package/SimpleCraftSim

          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".vscode/" \
            --exclude "Asset/" \
            --exclude ".gitignore" \
            --exclude ".gitattributes" \
            --exclude "package/" \
            ./ package/SimpleCraftSim/

          echo "Package content:"
          find package/SimpleCraftSim -maxdepth 2 -print

      - name: Create zip
        run: |
          set -euo pipefail
          cd package
          ZIP_NAME="../SimpleCraftSim-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" SimpleCraftSim

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: SimpleCraftSim-${{ github.event.release.tag_name }}.zip
